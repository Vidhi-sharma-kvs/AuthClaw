services:
  authclaw-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: authclaw-api:production
    env_file:
      - path: .env.production.local
        required: false
    environment:
      AUTHCLAW_OPA_ENABLED: "true"
      AUTHCLAW_OPA_POLICY_URL: http://opa:8181/v1/data/authclaw/policy
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  authclaw-gateway:
    build:
      context: ./gateway-go
      dockerfile: Dockerfile
    image: authclaw-gateway:production
    env_file:
      - path: .env.production.local
        required: false
    environment:
      AUTHCLAW_GATEWAY_ADDR: 0.0.0.0:9000
      AUTHCLAW_BACKEND_URL: http://authclaw-api:8000
      AUTHCLAW_OPA_URL: http://opa:8181/v1/data/authclaw/policy
      KAFKA_BROKERS: kafka:9092
      AUTHCLAW_AUDIT_TOPIC: authclaw-audit-events
      KAFKA_REST_URL: http://kafka-rest:8082
    ports:
      - "9000:9000"
    depends_on:
      authclaw-api:
        condition: service_healthy
      kafka:
        condition: service_started
      opa:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  authclaw-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_GATEWAY_PUBLIC_URL: /api
    image: authclaw-frontend:production
    env_file:
      - path: .env.production.local
        required: false
    ports:
      - "8080:80"
    depends_on:
      authclaw-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16
    env_file:
      - path: .env.production.local
        required: false
    environment:
      POSTGRES_DB: authclaw
      POSTGRES_USER: authclaw
    volumes:
      - authclaw-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authclaw -d authclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - authclaw-zookeeper:/var/lib/zookeeper/data
      - ./deployment/kafka/zookeeper.properties:/opt/authclaw/kafka/zookeeper.properties:ro

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - authclaw-kafka:/var/lib/kafka/data
      - ./deployment/kafka/server.properties:/opt/authclaw/kafka/server.properties:ro
      - ./deployment/kafka/topics:/opt/authclaw/kafka/topics:ro
      - ./deployment/kafka/create-topics.sh:/opt/authclaw/kafka/create-topics.sh:ro
      - ./deployment/kafka/consumer-authclaw-audit-events.sh:/opt/authclaw/kafka/consumer-authclaw-audit-events.sh:ro

  kafka-rest:
    image: confluentinc/cp-kafka-rest:7.6.1
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_REST_HOST_NAME: kafka-rest
      KAFKA_REST_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
    ports:
      - "8082:8082"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9001:9000"
    environment:
      CLICKHOUSE_DB: authclaw
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - authclaw-clickhouse:/var/lib/clickhouse
      - ./deployment/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:0.68.0
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro

volumes:
  authclaw-postgres:
  authclaw-zookeeper:
  authclaw-kafka:
  authclaw-clickhouse:
