services:
  authclaw-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: authclaw-api:production
    env_file:
      - path: .env.production.local
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  authclaw-gateway:
    build:
      context: ./gateway-go
      dockerfile: Dockerfile
    image: authclaw-gateway:production
    env_file:
      - path: .env.production.local
        required: false
    environment:
      AUTHCLAW_GATEWAY_ADDR: 0.0.0.0:9000
      AUTHCLAW_BACKEND_URL: http://authclaw-api:8000
    ports:
      - "9000:9000"
    depends_on:
      authclaw-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  authclaw-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_GATEWAY_PUBLIC_URL: /api
    image: authclaw-frontend:production
    env_file:
      - path: .env.production.local
        required: false
    ports:
      - "8080:80"
    depends_on:
      authclaw-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16
    env_file:
      - path: .env.production.local
        required: false
    environment:
      POSTGRES_DB: authclaw
      POSTGRES_USER: authclaw
    volumes:
      - authclaw-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authclaw -d authclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  authclaw-postgres:
