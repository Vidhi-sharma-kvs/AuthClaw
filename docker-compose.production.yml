services:
  authclaw-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: authclaw-api:production
    env_file:
      - deployment/aws/env.production.template
    environment:
      AUTHCLAW_ENV: production
      DATABASE_URL: postgresql://authclaw:${POSTGRES_PASSWORD}@postgres:5432/authclaw
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  authclaw-gateway:
    build:
      context: ./gateway-go
      dockerfile: Dockerfile
    image: authclaw-gateway:production
    environment:
      AUTHCLAW_GATEWAY_ADDR: 0.0.0.0:9000
      AUTHCLAW_BACKEND_URL: http://authclaw-api:8000
      AUTHCLAW_ALLOWED_ORIGINS: ${AUTHCLAW_ALLOWED_ORIGINS}
    ports:
      - "9000:9000"
    depends_on:
      authclaw-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  authclaw-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_GATEWAY_PUBLIC_URL: ${VITE_GATEWAY_PUBLIC_URL:-/api}
    image: authclaw-frontend:production
    ports:
      - "8080:80"
    depends_on:
      authclaw-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: authclaw
      POSTGRES_USER: authclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - authclaw-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authclaw -d authclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  authclaw-postgres:
