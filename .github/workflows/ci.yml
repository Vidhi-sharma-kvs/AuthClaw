name: AuthClaw CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_live_benchmark:
        description: "Run live gateway benchmark against BENCHMARK_BASE_URL"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: vidhi
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:vidhi@localhost:5432/authclaw_test
      GOOGLE_API_KEY: dummy
      AUTHCLAW_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system document dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run backend test suite
        run: pytest -q

  frontend-quality:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Python static security scan
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -r . -x "./venv,./venv_new,./venv_test,./venv_default,./frontend/node_modules,./deployment/ec2/generated,./tests,./scratch,./final_verify.py,./test_audit_chain.py,./test_e2e_metrics_and_chain.py,./test_gateway.py,./test_hitl_workflow.py,./verify_audit.py,./verify_cors_and_apis.py,./verify_rag_endpoints.py" -ll
      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t authclaw-api:ci -f Dockerfile .
      - name: Build frontend image
        run: docker build -t authclaw-frontend:ci -f frontend/Dockerfile frontend

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deployment/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform format check
        run: terraform fmt -check -recursive
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

  live-benchmark:
    name: Live gateway benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_benchmark == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install benchmark dependencies
        run: pip install requests
      - name: Run live latency benchmark
        env:
          BENCHMARK_BASE_URL: ${{ vars.BENCHMARK_BASE_URL }}
          BENCHMARK_API_KEY: ${{ secrets.BENCHMARK_API_KEY }}
        run: >
          python scripts/gateway_benchmark.py
          --base-url "$BENCHMARK_BASE_URL"
          --api-key "$BENCHMARK_API_KEY"
          --requests 10
          --concurrency 4
          --min-success-rate 0.95
          --max-p95-ms 5000

