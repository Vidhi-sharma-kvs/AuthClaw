name: Bug report
description: Report a reproducible AuthClaw defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, route, UI path, and data used.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Go Gateway
        - Python Backend
        - Frontend
        - Policy Engine
        - Tenant Isolation
        - Documents/OCR
        - Deployment/CI
        - Security/Secrets
    validations:
      required: true

